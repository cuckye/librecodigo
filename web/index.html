<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libre Codigo - IDE Visual</title>
  <link rel="icon" href="../logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#FFFCF5;--bg2:#FAF3E6;--bg3:#F0E6D8;--surface:#FFFFFF;
      --border:#E8DDD0;--border2:#D4C5B5;
      --text:#1F2937;--text2:#6B7280;--text3:#9CA3AF;
      --accent:#C96B4B;--accent2:#D97B2E;--accent3:#874418;
      --amber:#F0B429;--sand:#F0E6D8;--cream:#FFFCF5;
      --success:#059669;--warning:#D97B2E;--error:#DC2626;
      --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    }
    html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--border2)}

    .app{display:flex;flex-direction:column;height:100vh}

    /* Titlebar */
    .titlebar{height:34px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;user-select:none;flex-shrink:0}
    .titlebar img{width:18px;height:18px}
    .titlebar-title{font-size:12px;font-weight:600;color:var(--text)}
    .titlebar-actions{margin-left:auto;display:flex;gap:4px}
    .titlebar-actions button{width:28px;height:28px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px}
    .titlebar-actions button:hover{background:var(--bg3)}

    /* Main area */
    .main{display:flex;flex:1;overflow:hidden;min-height:0}

    /* Activity bar */
    .activity-bar{width:44px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;flex-shrink:0}
    .activity-btn{width:38px;height:38px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s;font-size:16px}
    .activity-btn:hover{background:var(--bg3);color:var(--text)}
    .activity-btn.active{background:var(--accent);color:#fff}

    /* Sidebar */
    .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .15s}
    .sidebar.collapsed{width:0;border:none}
    .sidebar-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .sidebar-header h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
    .sidebar-actions{display:flex;gap:2px}
    .sidebar-actions button{width:22px;height:22px;border:none;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px}
    .sidebar-actions button:hover{background:var(--bg3)}
    .sidebar-content{flex:1;overflow-y:auto;padding:4px 0}

    /* Editor area */
    .editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .tabs-bar{height:34px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;overflow-x:auto;flex-shrink:0;padding:0 4px}
    .tab{height:30px;padding:0 14px;border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);white-space:nowrap;margin:0 1px;transition:all .1s}
    .tab:hover{background:var(--bg3)}
    .tab.active{background:var(--surface);color:var(--text);border-color:var(--border);font-weight:500}
    .tab .modified{width:5px;height:5px;border-radius:50%;background:var(--accent)}
    .tab .close{width:14px;height:14px;border:none;background:transparent;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;opacity:0}
    .tab:hover .close{opacity:1}

    /* Editor content area — flex container */
    .editor-content{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}

    /* Welcome */
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;gap:12px;color:var(--text2)}
    .welcome img{width:64px;height:64px}
    .welcome h2{font-size:18px;color:var(--text);font-weight:600}
    .welcome p{font-size:13px;max-width:360px;text-align:center;line-height:1.6}
    .welcome-actions{display:flex;gap:10px;margin-top:6px}
    .welcome-actions button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;transition:all .15s}
    .welcome-actions button:hover{border-color:var(--accent);color:var(--accent)}
    .welcome-actions button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .welcome-actions button.primary:hover{background:var(--accent3)}

    /* Split divider */
    .split-divider{width:3px;background:var(--border);cursor:ew-resize;flex-shrink:0;transition:background .1s}
    .split-divider:hover{background:var(--accent)}

    /* Bottom panel */
    .bottom-panel{height:180px;border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:height .15s}
    .bottom-panel.collapsed{height:0;border:none;overflow:hidden}
    .bottom-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px}
    .bottom-tab{padding:6px 14px;font-size:11px;border:none;background:transparent;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;font-weight:500}
    .bottom-tab:hover{color:var(--text)}
    .bottom-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .bottom-content{flex:1;overflow:auto;padding:4px 8px;font-family:var(--mono);font-size:12px;min-height:0}

    /* Statusbar */
    .statusbar{height:22px;background:var(--accent);color:#fff;display:flex;align-items:center;padding:0 10px;font-size:10px;gap:12px;flex-shrink:0}
    .statusbar span{opacity:.9}
    .statusbar .right{margin-left:auto;display:flex;gap:12px}
    .view-modes{display:flex;gap:3px}
    .view-mode-btn{padding:2px 8px;border:1px solid rgba(255,255,255,.3);background:transparent;border-radius:4px;font-size:10px;cursor:pointer;color:#fff;font-family:var(--font)}
    .view-mode-btn.active{background:rgba(255,255,255,.2)}

    /* File tree */
    .file-tree-item{display:flex;align-items:center;gap:6px;padding:3px 8px;cursor:pointer;font-size:12px;color:var(--text);transition:background .1s}
    .file-tree-item:hover{background:var(--bg3)}
    .file-tree-item.active{background:var(--accent);color:#fff;border-radius:4px;margin:0 4px;padding:3px 4px}

    /* Block editor */
    .block-editor{display:flex;width:100%;height:100%;overflow:hidden}
    .block-palette{width:200px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:4px 0}
    .block-cat{padding:4px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
    .block-item{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:5px;cursor:grab;font-size:11px;transition:background .1s}
    .block-item:hover{background:var(--bg3)}
    .block-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .block-canvas{flex:1;background:var(--bg);background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:16px 16px;overflow:auto;padding:16px;position:relative}
    .block-node{position:absolute;border-radius:10px;padding:10px 16px;color:#fff;font-size:12px;font-weight:600;cursor:grab;min-width:140px;text-align:center;box-shadow:0 3px 12px rgba(0,0,0,.15);transition:box-shadow .15s;user-select:none}
    .block-node:hover{box-shadow:0 6px 20px rgba(0,0,0,.25)}
    .block-node.selected{outline:2px solid var(--text);outline-offset:2px}
    .block-node .delete-btn{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--error);color:#fff;border:none;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
    .block-node:hover .delete-btn{display:flex}
    .block-edge{position:absolute;pointer-events:none}

    /* Community / plugins */
    .panel-content{padding:8px 10px}
    .panel-content h4{font-size:12px;font-weight:600;margin-bottom:8px}
    .plugin-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
    .plugin-card:hover{border-color:var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.06)}
    .plugin-card .name{font-size:12px;font-weight:600}
    .plugin-card .author{font-size:10px;color:var(--text3)}
    .plugin-card .desc{font-size:11px;color:var(--text2);margin-top:3px}
    .plugin-card .meta{display:flex;gap:10px;margin-top:4px;font-size:10px;color:var(--text3)}

    /* Settings */
    .settings-group{margin-bottom:12px}
    .settings-group label{font-size:11px;font-weight:500;color:var(--text2);display:block;margin-bottom:3px}
    .settings-group select,.settings-group input[type=range]{width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);color:var(--text)}

    /* Search */
    .search-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font)}
    .search-input:focus{outline:none;border-color:var(--accent)}
    .search-result{padding:4px 6px;font-size:11px;border-radius:3px;cursor:pointer;font-family:var(--mono)}
    .search-result:hover{background:var(--bg3)}

    /* Notifications */
    .notifications{position:fixed;top:44px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px}
    .notification{padding:8px 14px;border-radius:6px;font-size:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);animation:slideIn .2s;min-width:180px}
    .notification.info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
    .notification.success{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46}
    .notification.error{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

    /* Context menu */
    .context-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:10000;padding:3px;min-width:160px}
    .context-menu-item{padding:5px 10px;font-size:11px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:6px}
    .context-menu-item:hover{background:var(--bg3)}
    .context-menu-item.danger{color:var(--error)}
    .context-menu-divider{height:1px;background:var(--border);margin:3px 0}
  </style>
</head>
<body>
  <div class="app">
    <div class="titlebar">
      <img src="../logo.png" alt="LC">
      <span class="titlebar-title" id="projectTitle">Libre Codigo - IDE Web</span>
      <div class="titlebar-actions">
        <button onclick="toggleSidebar()" title="Sidebar (Ctrl+B)">&#9776;</button>
        <button onclick="toggleBottomPanel()" title="Terminal (Ctrl+`)">&#9650;</button>
      </div>
    </div>
    <div class="main">
      <div class="activity-bar">
        <button class="activity-btn active" data-panel="explorer" onclick="switchPanel('explorer')" title="Explorador">&#128193;</button>
        <button class="activity-btn" data-panel="blocks" onclick="switchPanel('blocks')" title="Bloques">&#129513;</button>
        <button class="activity-btn" data-panel="search" onclick="switchPanel('search')" title="Buscar">&#128269;</button>
        <button class="activity-btn" data-panel="community" onclick="switchPanel('community')" title="Comunidad">&#128101;</button>
        <button class="activity-btn" data-panel="extensions" onclick="switchPanel('extensions')" title="Plugins">&#128268;</button>
        <button class="activity-btn" data-panel="settings" onclick="switchPanel('settings')" title="Configuracion">&#9881;</button>
      </div>
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3 id="sidebarTitle">Explorador</h3>
          <div class="sidebar-actions" id="sidebarActions">
            <button onclick="newFile()" title="Nuevo archivo">+</button>
          </div>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
      </div>
      <div class="editor-area">
        <div class="tabs-bar" id="tabsBar"></div>
        <div class="editor-content" id="editorContent">
          <div class="welcome" id="welcomeScreen">
            <img src="../logo.png" alt="Libre Codigo">
            <h2>Bienvenido a Libre Codigo</h2>
            <p>IDE visual con bloques y codigo real. Crea un proyecto o abre un archivo.</p>
            <div class="welcome-actions">
              <button class="primary" onclick="newProject()">Nuevo Proyecto</button>
              <button onclick="newFile()">Nuevo Archivo</button>
            </div>
          </div>
          <div id="monacoContainer" style="flex:1;display:none;min-width:0"></div>
          <div id="splitDivider" class="split-divider" style="display:none"></div>
          <div id="blockEditorContainer" style="flex:1;display:none;min-width:0"></div>
        </div>
      </div>
    </div>
    <div class="bottom-panel" id="bottomPanel">
      <div class="bottom-tabs">
        <button class="bottom-tab active" data-btab="terminal" onclick="switchBottomTab('terminal')">Terminal</button>
        <button class="bottom-tab" data-btab="output" onclick="switchBottomTab('output')">Salida</button>
      </div>
      <div class="bottom-content" id="terminalContainer"></div>
      <div class="bottom-content" id="outputContainer" style="display:none"></div>
    </div>
    <div class="statusbar">
      <span id="statusLanguage">JavaScript</span>
      <span id="statusFile">Sin archivo</span>
      <div class="right">
        <div class="view-modes">
          <button class="view-mode-btn active" onclick="setViewMode('code')">Codigo</button>
          <button class="view-mode-btn" onclick="setViewMode('blocks')">Bloques</button>
          <button class="view-mode-btn" onclick="setViewMode('split')">Dividir</button>
        </div>
        <span id="statusCursor">Ln 1, Col 1</span>
        <span>UTF-8</span>
      </div>
    </div>
  </div>
  <div class="notifications" id="notifications"></div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="engine.js"></script>

  <script>
  const E = window.LibreCodigoEngine || {};
  const API_BASE = window.location.origin;

  let state = {
    files: {},
    openFiles: [],
    activeFile: null,
    language: 'javascript',
    viewMode: 'code',
    sidebarPanel: 'explorer',
    bottomTab: 'terminal',
    sidebarOpen: true,
    bottomOpen: true,
    modified: new Set(),
    blockNodes: [],
    blockEdges: [],
    dragBlock: null,
    dragOffset: { x: 0, y: 0 },
    blockUndoStack: [],
    blockRedoStack: [],
  };

  const DEFAULT_FILES = {
    'mi-proyecto/main.js': 'function main() {\n    console.log("Hola desde Libre Codigo!");\n    for (let i = 0; i < 5; i++) {\n        console.log("Iteracion: " + i);\n    }\n    const resultado = sumar(10, 20);\n    console.log("Resultado: " + resultado);\n}\n\nfunction sumar(a, b) {\n    return a + b;\n}\n\nmain();\n',
    'mi-proyecto/utils.js': '// Funciones de utilidad\nexport function formatDate(date) {\n    return date.toLocaleDateString("es-ES");\n}\n\nexport function capitalize(str) {\n    return str.charAt(0).toUpperCase() + str.slice(1);\n}\n',
    'mi-proyecto/app.py': '# Programa principal\nimport sys\n\ndef main():\n    print("Hola desde Libre Codigo en Python!")\n    numeros = [1, 2, 3, 4, 5]\n    for n in numeros:\n        print(f"Numero: {n}")\n    resultado = sumar(10, 20)\n    print(f"Resultado: {resultado}")\n\ndef sumar(a, b):\n    return a + b\n\nif __name__ == "__main__":\n    main()\n',
    'mi-proyecto/hello.bat': '@echo off\nREM Programa en Batch\necho Hola desde Libre Codigo en Batch!\nset /a count=0\n:loop\nif %count% GEQ 5 goto done\necho Iteracion: %count%\nset /a count=%count%+1\ngoto loop\n:done\necho Completado!\npause\n',
    'mi-proyecto/styles.css': 'body {\n    font-family: "Inter", sans-serif;\n    margin: 0;\n    padding: 0;\n    background: #FFFCF5;\n    color: #1F2937;\n}\n',
    'mi-proyecto/index.html': '<!DOCTYPE html>\n<html lang="es">\n<head>\n    <meta charset="UTF-8">\n    <title>Mi Proyecto</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <h1>Mi Proyecto</h1>\n    <p>Generado con Libre Codigo</p>\n</body>\n</html>',
    'mi-proyecto/package.json': '{\n    "name": "mi-proyecto",\n    "version": "1.0.0"\n}\n',
  };

  function initFileSystem() {
    const saved = localStorage.getItem('lc_web_state');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        Object.assign(state.files, parsed.files || {});
        state.openFiles = parsed.openFiles || [];
        state.activeFile = parsed.activeFile || null;
        state.language = parsed.language || 'javascript';
        state.viewMode = parsed.viewMode || 'code';
        state.sidebarPanel = parsed.sidebarPanel || 'explorer';
        state.sidebarOpen = parsed.sidebarOpen !== undefined ? parsed.sidebarOpen : true;
        state.bottomOpen = parsed.bottomOpen !== undefined ? parsed.bottomOpen : true;
        return;
      } catch(e) {}
    }
    Object.entries(DEFAULT_FILES).forEach(([path, content]) => {
      if (content !== null) state.files[path] = content;
    });
  }

  function saveState() {
    const toSave = {
      files: state.files,
      openFiles: state.openFiles,
      activeFile: state.activeFile,
      language: state.language,
      viewMode: state.viewMode,
      sidebarPanel: state.sidebarPanel,
      sidebarOpen: state.sidebarOpen,
      bottomOpen: state.bottomOpen,
    };
    try { localStorage.setItem('lc_web_state', JSON.stringify(toSave)); } catch(e) {}
  }
  function getFileName(p) { return p.split('/').filter(Boolean).pop(); }
  function getFileLanguage(p) {
    const ext = p.split('.').pop().toLowerCase();
    return { js:'javascript', py:'python', bat:'batch', css:'css', html:'html', json:'json' }[ext] || 'plaintext';
  }
  function getFileIcon(p) {
    const ext = p.split('.').pop().toLowerCase();
    return { js:'&#128196;', py:'&#128013;', bat:'&#128187;', css:'&#127912;', html:'&#127760;', json:'{ }', txt:'&#128196;' }[ext] || '&#128196;';
  }

  function getDirChildren(dirPath) {
    const children = new Set();
    Object.keys(state.files).forEach(path => {
      if (path.startsWith(dirPath) && path !== dirPath) {
        children.add(path.slice(dirPath.length).split('/')[0]);
      }
    });
    return Array.from(children).sort();
  }

  // ── File Tree ──
  function renderFileTree() {
    const container = document.getElementById('sidebarContent');
    if (state.sidebarPanel !== 'explorer') return;
    const dirs = new Set();
    const files = new Set();
    Object.keys(state.files).forEach(path => {
      const parts = path.split('/').filter(Boolean);
      for (let i = 1; i < parts.length; i++) dirs.add(parts.slice(0, i).join('/') + '/');
      if (!path.endsWith('/')) files.add(path);
    });
    let html = '';
    function renderNode(depth, prefix) {
      const children = [];
      dirs.forEach(d => {
        if (d.startsWith(prefix) && d.split('/').filter(Boolean).length === depth + 1)
          children.push({ path: d, type: 'dir' });
      });
      files.forEach(f => {
        if (f.startsWith(prefix) && !f.endsWith('/') && f.split('/').filter(Boolean).length === depth)
          children.push({ path: f, type: 'file' });
      });
      children.sort((a, b) => a.path.localeCompare(b.path));
      children.forEach(child => {
        const name = getFileName(child.path);
        const indent = depth * 14;
        const active = state.activeFile === child.path ? ' active' : '';
        const icon = child.type === 'dir' ? '&#128193;' : getFileIcon(child.path);
        html += '<div class="file-tree-item' + active + '" style="padding-left:' + (10 + indent) + 'px" onclick="' + (child.type === 'file' ? "openFile('" + child.path + "')" : "void(0)") + '" oncontextmenu="showFileContextMenu(event,\'' + child.path + '\')">';
        html += '<span style="font-size:13px">' + icon + '</span>';
        html += '<span>' + name + '</span></div>';
      });
    }
    renderNode(0, '');
    container.innerHTML = html || '<div style="padding:12px;color:var(--text3);font-size:11px">Sin archivos</div>';
  }

  // ── Monaco ──
  let editor = null;
  const WARM_THEME = {
    base: 'vs', inherit: true,
    rules: [
      { token: 'keyword', foreground: 'C96B4B', fontStyle: 'bold' },
      { token: 'string', foreground: 'F0B429' },
      { token: 'comment', foreground: 'B8B0A5', fontStyle: 'italic' },
      { token: 'number', foreground: 'D97B2E' },
      { token: 'type', foreground: '059669' },
      { token: 'function', foreground: 'C96B4B' },
    ],
    colors: {
      'editor.background': '#FFFCF5', 'editor.foreground': '#1F2937',
      'editorCursor.foreground': '#C96B4B', 'editor.lineHighlightBackground': '#FAF3E6',
      'editor.selectionBackground': '#C96B4B33', 'editorLineNumber.foreground': '#D4C5B5',
      'editorLineNumber.activeForeground': '#C96B4B', 'editorIndentGuide.background': '#F0E6D8',
    }
  };

  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
  require(['vs/editor/editor.main'], function () {
    monaco.editor.defineTheme('warm-future', WARM_THEME);
    editor = monaco.editor.create(document.getElementById('monacoContainer'), {
      value: '', language: 'javascript', theme: 'warm-future',
      fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
      minimap: { enabled: true }, padding: { top: 8 },
      bracketPairColorization: { enabled: true },
      smoothScrolling: true, cursorBlinking: 'smooth',
      tabSize: 4, scrollBeyondLastLine: false,
    });
    editor.onDidChangeCursorPosition(e => {
      document.getElementById('statusCursor').textContent = 'Ln ' + e.position.lineNumber + ', Col ' + e.position.column;
    });
    editor.onDidChangeModelContent(() => {
      if (state.activeFile) {
        state.files[state.activeFile] = editor.getValue();
        state.modified.add(state.activeFile);
        renderTabs();
      }
    });
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => saveFile());
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyN, () => newFile());
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Backquote, () => toggleBottomPanel());
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyB, () => toggleSidebar());
  });

  function openFile(path) {
    if (!(path in state.files)) return;
    if (!state.openFiles.includes(path)) state.openFiles.push(path);
    state.activeFile = path;
    state.language = getFileLanguage(path);
    if (editor) {
      let model = editor.getModel();
      if (!model || model.isDisposed()) {
        model = monaco.editor.createModel(state.files[path], state.language);
      } else {
        model.setValue(state.files[path]);
        monaco.editor.setModelLanguage(model, state.language);
      }
      editor.setModel(model);
    }
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('monacoContainer').style.display = state.viewMode === 'blocks' ? 'none' : 'block';
    document.getElementById('statusLanguage').textContent = state.language.charAt(0).toUpperCase() + state.language.slice(1);
    document.getElementById('statusFile').textContent = getFileName(path);
    renderTabs(); renderFileTree();
    saveState();
    setTimeout(() => { if (editor) editor.layout(); }, 50);
  }

  function closeFile(path) {
    state.openFiles = state.openFiles.filter(f => f !== path);
    state.modified.delete(path);
    if (state.activeFile === path) {
      state.activeFile = state.openFiles[state.openFiles.length - 1] || null;
      if (state.activeFile) openFile(state.activeFile); else showWelcome();
    }
    renderTabs(); renderFileTree();
  }

  function showWelcome() {
    state.activeFile = null;
    document.getElementById('welcomeScreen').style.display = 'flex';
    document.getElementById('monacoContainer').style.display = 'none';
    document.getElementById('blockEditorContainer').style.display = 'none';
    document.getElementById('splitDivider').style.display = 'none';
    document.getElementById('statusFile').textContent = 'Sin archivo';
  }

  function saveFile() {
    if (!state.activeFile) return;
    state.modified.delete(state.activeFile);
    state.files[state.activeFile] = editor ? editor.getValue() : (state.files[state.activeFile] || '');
    renderTabs(); saveState(); notify('Archivo guardado', 'success');
  }

  function newFile() {
    const name = prompt('Nombre del archivo:', 'nuevo-archivo.js');
    if (!name) return;
    const path = 'mi-proyecto/' + name;
    state.files[path] = '';
    renderFileTree(); saveFile(); openFile(path); saveState();
  }

  function renderTabs() {
    const bar = document.getElementById('tabsBar');
    bar.innerHTML = state.openFiles.map(path => {
      const name = getFileName(path);
      const active = path === state.activeFile ? ' active' : '';
      const modified = state.modified.has(path) ? '<span class="modified"></span>' : '';
      return '<div class="tab' + active + '" onclick="openFile(\'' + path + '\')">' +
        '<span>' + getFileIcon(path) + ' ' + name + '</span>' + modified +
        '<button class="close" onclick="event.stopPropagation();closeFile(\'' + path + '\')">&times;</button></div>';
    }).join('');
  }

  // ── Panels ──
  function switchPanel(panel) {
    state.sidebarPanel = panel;
    saveState();
    document.querySelectorAll('.activity-btn').forEach(b => b.classList.toggle('active', b.dataset.panel === panel));
    const titles = { explorer:'Explorador', blocks:'Bloques', search:'Buscar', community:'Comunidad', extensions:'Plugins', settings:'Configuracion' };
    document.getElementById('sidebarTitle').textContent = titles[panel] || panel;
    const actions = document.getElementById('sidebarActions');
    actions.innerHTML = panel === 'explorer' ? '<button onclick="newFile()" title="Nuevo archivo">+</button><button onclick="exportProject()" title="Exportar proyecto">&#128229;</button><button onclick="importProject()" title="Importar proyecto">&#128228;</button>' : '';
    renderSidebarContent();
  }

  function renderSidebarContent() {
    const container = document.getElementById('sidebarContent');
    switch (state.sidebarPanel) {
      case 'explorer': renderFileTree(); break;
      case 'blocks': renderBlocksPalette(container); break;
      case 'search': renderSearchPanel(container); break;
      case 'community': renderCommunityPanel(container); break;
      case 'extensions': renderExtensionsPanel(container); break;
      case 'settings': renderSettingsPanel(container); break;
    }
  }

  // ── Blocks Palette ──
  function renderBlocksPalette(container) {
    let cats;
    try { cats = E.blockLibrary ? E.blockLibrary.getAllCategories() : []; } catch(e) { cats = []; }
    let html = '<div class="panel-content">';
    if (cats.length === 0) {
      html += '<p style="color:var(--text3);font-size:11px;padding:8px">Motor no cargado. Los bloques requieren engine.js.</p>';
    }
    cats.forEach(cat => {
      let blocks;
      try { blocks = E.blockLibrary.getCategoryBlocks(cat); } catch(e) { blocks = []; }
      if (!blocks.length) return;
      html += '<div class="block-cat" style="color:' + (blocks[0] ? blocks[0].color : '#888') + '">' + cat.toUpperCase() + '</div>';
      blocks.forEach(b => {
        html += '<div class="block-item" draggable="true" ondragstart="dragBlockStart(event,\'' + b.id + '\')" onclick="addBlockToCanvas(\'' + b.id + '\')">';
        html += '<div class="block-dot" style="background:' + b.color + '"></div><span>' + b.label + '</span></div>';
      });
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function dragBlockStart(e, blockId) {
    e.dataTransfer.setData('text/plain', blockId);
    e.dataTransfer.effectAllowed = 'copy';
  }

  function addBlockToCanvas(blockId) {
    let def;
    try { def = E.blockLibrary.getBlock(blockId); } catch(e) { return; }
    if (!def) return;
    saveBlockSnapshot();
    const canvas = document.getElementById('blockEditorContainer');
    const rect = canvas.getBoundingClientRect();
    const node = {
      id: 'n' + Date.now() + Math.random().toString(36).substr(2, 4),
      type: 'block',
      position: { x: 20 + (state.blockNodes.length % 4) * 160, y: 20 + Math.floor(state.blockNodes.length / 4) * 70 },
      data: { blockType: def.id, label: def.label, color: def.color, shape: def.shape, fields: {}, category: def.category },
    };
    state.blockNodes.push(node);
    if (state.blockNodes.length > 1) {
      state.blockEdges.push({
        id: 'e-' + state.blockNodes[state.blockNodes.length - 2].id + '-' + node.id,
        source: state.blockNodes[state.blockNodes.length - 2].id,
        target: node.id,
      });
    }
    renderBlockCanvas();
    syncBlocksToCode();
    notify('Bloque: ' + def.label, 'info');
  }

  function syncBlocksToCode() {
    if (!state.activeFile || !editor) return;
    try {
      const resolver = new E.BlockResolver();
      const ir = resolver.resolveNodes(state.blockNodes, state.blockEdges, state.language);
      const emitter = new E.MultiLanguageEmitter(state.language);
      const code = emitter.emit(ir);
      editor.setValue(code);
      state.files[state.activeFile] = code;
      state.modified.add(state.activeFile);
      renderTabs();
    } catch (err) {
      console.error('Blocks->Code:', err);
      notify('Error bloques->codigo: ' + err.message, 'error');
    }
  }

  function saveBlockSnapshot() {
    state.blockUndoStack.push({
      nodes: JSON.parse(JSON.stringify(state.blockNodes)),
      edges: JSON.parse(JSON.stringify(state.blockEdges)),
    });
    state.blockRedoStack = [];
    if (state.blockUndoStack.length > 50) state.blockUndoStack.shift();
  }
  function undoBlocks() {
    if (!state.blockUndoStack.length) return;
    state.blockRedoStack.push({
      nodes: JSON.parse(JSON.stringify(state.blockNodes)),
      edges: JSON.parse(JSON.stringify(state.blockEdges)),
    });
    const snap = state.blockUndoStack.pop();
    state.blockNodes = snap.nodes;
    state.blockEdges = snap.edges;
    renderBlockCanvas();
    syncBlocksToCode();
  }
  function redoBlocks() {
    if (!state.blockRedoStack.length) return;
    state.blockUndoStack.push({
      nodes: JSON.parse(JSON.stringify(state.blockNodes)),
      edges: JSON.parse(JSON.stringify(state.blockEdges)),
    });
    const snap = state.blockRedoStack.pop();
    state.blockNodes = snap.nodes;
    state.blockEdges = snap.edges;
    renderBlockCanvas();
    syncBlocksToCode();
  }

  let blockZoom = 1;

  function syncCodeToBlocks() {
    if (!state.activeFile || !editor) return;
    try {
      const code = editor.getValue();
      let ir;
      if (state.language === 'python') ir = new E.PythonParser().parse(code, state.language);
      else if (state.language === 'javascript') ir = new E.JavaScriptParser().parse(code, state.language);
      else if (state.language === 'batch') ir = new E.BatchParser().parse(code, state.language);
      else { notify('Sin parser para ' + state.language, 'error'); return; }
      const converter = new E.IRToBlocksConverter();
      const result = converter.convert(ir);
      state.blockNodes = result.nodes || [];
      state.blockEdges = result.edges || [];
      renderBlockCanvas();
      notify('Codigo->bloques: ' + state.blockNodes.length + ' bloques', 'success');
    } catch (err) {
      console.error('Code->Blocks:', err);
      notify('Error codigo->bloques: ' + err.message, 'error');
    }
  }

  function renderBlockCanvas() {
    const container = document.getElementById('blockEditorContainer');
    if (state.viewMode !== 'blocks' && state.viewMode !== 'split') return;
    container.innerHTML = '';
    container.style.display = 'flex';
    container.style.flexDirection = 'row';

    // Palette inside block editor
    const palette = document.createElement('div');
    palette.className = 'block-palette';
    renderBlocksPalette(palette);
    container.appendChild(palette);

    // Canvas
    const canvas = document.createElement('div');
    canvas.className = 'block-canvas';
    canvas.id = 'blockDropCanvas';
    canvas.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    canvas.addEventListener('drop', e => {
      e.preventDefault();
      const blockId = e.dataTransfer.getData('text/plain');
      if (blockId) addBlockToCanvas(blockId);
    });
    canvas.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        blockZoom = Math.max(0.3, Math.min(3, blockZoom + (e.deltaY > 0 ? -0.05 : 0.05)));
        canvas.style.transform = 'scale(' + blockZoom + ')';
        canvas.style.transformOrigin = '0 0';
      }
    });

    // Render edges as SVG
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible';
    state.blockEdges.forEach(edge => {
      const src = state.blockNodes.find(n => n.id === edge.source);
      const tgt = state.blockNodes.find(n => n.id === edge.target);
      if (!src || !tgt) return;
      const sx = src.position.x + 70, sy = src.position.y + 42;
      const tx = tgt.position.x + 70, ty = tgt.position.y;
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', 'M ' + sx + ' ' + sy + ' C ' + sx + ' ' + (sy + 20) + ' ' + tx + ' ' + (ty - 20) + ' ' + tx + ' ' + ty);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', '#D4C5B5');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('stroke-dasharray', '6 3');
      svg.appendChild(path);
    });
    canvas.appendChild(svg);

    // Render nodes
    state.blockNodes.forEach(node => {
      const el = document.createElement('div');
      el.className = 'block-node';
      el.style.left = node.position.x + 'px';
      el.style.top = node.position.y + 'px';
      el.style.background = node.data.color || '#888';
      el.textContent = node.data.label || node.data.blockType;
      el.dataset.nodeId = node.id;

      // Double-click to edit label
      el.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        const input = document.createElement('input');
        input.type = 'text';
        input.value = node.data.label || node.data.blockType;
        input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.6);color:#fff;font-size:12px;font-weight:600;text-align:center;width:100%;outline:none;padding:0';
        el.textContent = '';
        el.appendChild(input);
        input.focus();
        input.select();
        const commit = () => {
          node.data.label = input.value || node.data.blockType;
          renderBlockCanvas();
          syncBlocksToCode();
        };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); commit(); }
          if (ev.key === 'Escape') { input.value = node.data.label; commit(); }
        });
      });

      // Delete button
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.innerHTML = '&times;';
      del.onclick = (e) => {
        e.stopPropagation();
        saveBlockSnapshot();
        state.blockNodes = state.blockNodes.filter(n => n.id !== node.id);
        state.blockEdges = state.blockEdges.filter(ed => ed.source !== node.id && ed.target !== node.id);
        renderBlockCanvas();
        syncBlocksToCode();
      };
      el.appendChild(del);

      // Drag to move
      el.addEventListener('mousedown', (e) => {
        if (e.target === del) return;
        e.preventDefault();
        saveBlockSnapshot();
        state.dragBlock = node;
        state.dragOffset = { x: e.clientX - node.position.x, y: e.clientY - node.position.y };
        el.style.cursor = 'grabbing';
      });

      canvas.appendChild(el);
    });

    document.onmousemove = (e) => {
      if (!state.dragBlock) return;
      state.dragBlock.position.x = e.clientX - state.dragOffset.x;
      state.dragBlock.position.y = e.clientY - state.dragOffset.y;
      renderBlockCanvas();
    };
    document.onmouseup = () => {
      if (state.dragBlock) {
        state.dragBlock = null;
        syncBlocksToCode();
      }
    };

    container.appendChild(canvas);
  }

  // ── Search ──
  function renderSearchPanel(container) {
    container.innerHTML = '<div class="panel-content"><input class="search-input" placeholder="Buscar en archivos..." oninput="doSearch(this.value)"><div id="searchResults" style="margin-top:6px"></div></div>';
  }
  function doSearch(query) {
    const results = document.getElementById('searchResults');
    if (!query || query.length < 2) { results.innerHTML = ''; return; }
    const q = query.toLowerCase();
    let html = '';
    Object.keys(state.files).forEach(path => {
      if (path.endsWith('/')) return;
      const lines = state.files[path].split('\n');
      lines.forEach((line, i) => {
        if (line.toLowerCase().includes(q)) {
          html += '<div class="search-result" onclick="openFile(\'' + path + '\')"><span style="color:var(--accent);font-weight:500">' + getFileName(path) + '</span><span style="color:var(--text3);margin-left:4px">:' + (i+1) + '</span> <span style="color:var(--text2)">' + line.trim().substring(0, 50) + '</span></div>';
        }
      });
    });
    results.innerHTML = html || '<div style="padding:8px;color:var(--text3);font-size:11px">Sin resultados</div>';
  }

  // ── Community ──
  async function renderCommunityPanel(container) {
    container.innerHTML = '<div class="panel-content"><p style="color:var(--text3);font-size:11px">Cargando...</p></div>';
    let posts = [];
    try {
      const res = await fetch(API_BASE + '/api/posts');
      const data = await res.json();
      posts = data.posts || [];
    } catch (e) { /* server down */ }
    let html = '<div class="panel-content"><h4>Foro de Plugins</h4>';
    if (posts.length === 0) {
      html += '<p style="color:var(--text3);font-size:11px;text-align:center;padding:16px">Sin publicaciones.<br><a href="../#foro" target="_blank" style="color:var(--accent)">Ir al foro</a></p>';
    } else {
      html += '<div style="font-size:10px;color:var(--text3);margin-bottom:6px">' + posts.length + ' publicaciones</div>';
      posts.slice(0, 20).forEach(p => {
        const date = new Date(p.createdAt).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
        html += '<div class="plugin-card" onclick="installPostPlugin(\'' + p.id + '\')">';
        html += '<div class="name">' + (p.title || '') + '</div>';
        html += '<div class="author">por ' + (p.author || 'Anonimo') + ' - ' + date + '</div>';
        html += '<div class="desc">' + (p.description || '').substring(0, 80) + '</div>';
        html += '<div class="meta"><span>&#11015; ' + (p.downloads || 0) + '</span><span>&#128172; ' + (p.comments || []).length + '</span><span>&#10084; ' + (p.likes || 0) + '</span></div></div>';
      });

    html += '<div style="text-align:center;margin-top:8px"><a href="../#foro" target="_blank" style="color:var(--accent);font-size:11px">Abrir foro completo &rarr;</a></div></div>';

  async function installPostPlugin(id) {
    try {
      const res = await fetch(API_BASE + '/api/posts/' + id);
      const data = await res.json();
      const post = data.post;
      if (!post || !post.fileName) { notify('Sin archivo adjunto', 'error'); return; }
      const dlRes = await fetch(API_BASE + '/api/posts/' + id + '/download');
      const code = await dlRes.text();
      const path = 'mi-proyecto/plugins/' + (post.title.replace(/[^a-zA-Z0-9]/g, '_') || 'plugin') + '.js';
      state.files[path] = code;
      openFile(path);
      notify('Plugin: ' + post.title, 'success');
    } catch (e) {
      notify('Error al descargar plugin', 'error');
    }
  }

  function renderExtensionsPanel(container) {
    container.innerHTML = '<div class="panel-content"><h4>Plugins</h4><p style="font-size:11px;color:var(--text2);margin-bottom:8px">Publica y descarga plugins desde el foro.</p><a href="../#foro" target="_blank" style="display:inline-block;padding:6px 12px;background:var(--accent);color:#fff;border-radius:6px;font-size:11px;text-decoration:none;font-weight:500">Abrir Foro</a></div>';

  function renderSettingsPanel(container) {
    container.innerHTML = '<div class="panel-content"><div class="settings-group"><label>Idioma del codigo</label><select onchange="changeLanguage(this.value)"><option value="javascript"' + (state.language==='javascript'?' selected':'') + '>JavaScript</option><option value="python"' + (state.language==='python'?' selected':'') + '>Python</option><option value="batch"' + (state.language==='batch'?' selected':'') + '>Batch</option></select></div><div class="settings-group"><label>Tamano de fuente</label><input type="range" min="10" max="22" value="13" onchange="changeFontSize(this.value)"></div><div class="settings-group"><label>Tab</label><select onchange="changeTabSize(this.value)"><option value="2">2 espacios</option><option value="4" selected>4 espacios</option></select></div></div>';

  function changeLanguage(lang) {
    state.language = lang;
    if (editor && state.activeFile) monaco.editor.setModelLanguage(editor.getModel(), lang);
    document.getElementById('statusLanguage').textContent = lang.charAt(0).toUpperCase() + lang.slice(1);
  }
  function changeFontSize(size) { if (editor) editor.updateOptions({ fontSize: parseInt(size) }); }
  function changeTabSize(size) { if (editor) editor.updateOptions({ tabSize: parseInt(size) }); }

  // ── View Modes ──
  function setViewMode(mode) {
    state.viewMode = mode;
    saveState();
    document.querySelectorAll('.view-mode-btn').forEach(b => {
      const txt = b.textContent.toLowerCase();
      b.classList.toggle('active', (mode === 'code' && txt.includes('codigo')) || (mode === 'blocks' && txt.includes('bloques')) || (mode === 'split' && txt.includes('dividir')));
    });
    const monacoEl = document.getElementById('monacoContainer');
    const blockEl = document.getElementById('blockEditorContainer');
    const divider = document.getElementById('splitDivider');
    switch (mode) {
      case 'code':
        monacoEl.style.display = state.activeFile ? 'block' : 'none';
        blockEl.style.display = 'none';
        divider.style.display = 'none';
        if (editor) editor.layout();
        break;
      case 'blocks':
        monacoEl.style.display = 'none';
        blockEl.style.display = 'flex';
        divider.style.display = 'none';
        if (state.activeFile) syncCodeToBlocks();
        else renderBlockCanvas();
        break;
      case 'split':
        monacoEl.style.display = state.activeFile ? 'block' : 'none';
        monacoEl.style.flex = '1';
        monacoEl.style.minWidth = '0';
        blockEl.style.display = 'flex';
        blockEl.style.flex = '1';
        blockEl.style.minWidth = '0';
        divider.style.display = 'block';
        if (state.activeFile) syncCodeToBlocks();
        else renderBlockCanvas();
        if (editor) editor.layout();
        break;
    }
  }

  // ── Terminal ──
  let terminal = null, fitAddon = null, termHistory = [], historyIdx = -1, lineBuf = '';

  function initTerminal() {
    terminal = new Terminal({
      theme: { background: '#FFFCF5', foreground: '#1F2937', cursor: '#C96B4B', selectionBackground: '#C96B4B33' },
      fontFamily: "'JetBrains Mono', monospace", fontSize: 12, cursorBlink: true,
    });
    fitAddon = new FitAddon.FitAddon();
    terminal.loadAddon(fitAddon);
    terminal.open(document.getElementById('terminalContainer'));
    fitAddon.fit();
    terminal.writeln('\x1b[33mLibre Codigo Web Terminal v0.1.0\x1b[0m');
    terminal.writeln('\x1b[90mEscribe "help" para ver comandos\x1b[0m');
    terminal.write('\r\n\x1b[36m$\x1b[0m ');
    terminal.onKey(({ key, domEvent }) => {
      const ev = domEvent;
      if (ev.key === 'Enter') {
        terminal.writeln('');
        if (lineBuf.trim()) { termHistory.push(lineBuf); historyIdx = termHistory.length; execTerm(lineBuf.trim()); }
        lineBuf = '';
        terminal.write('\x1b[36m$\x1b[0m ');
      } else if (ev.key === 'Backspace') {
        if (lineBuf.length > 0) { lineBuf = lineBuf.slice(0, -1); terminal.write('\b \b'); }
      } else if (ev.key === 'ArrowUp') {
        if (historyIdx > 0) { historyIdx--; clearTL(); lineBuf = termHistory[historyIdx]; terminal.write(lineBuf); }
      } else if (ev.key === 'ArrowDown') {
        if (historyIdx < termHistory.length - 1) { historyIdx++; clearTL(); lineBuf = termHistory[historyIdx]; terminal.write(lineBuf); }
        else { historyIdx = termHistory.length; clearTL(); lineBuf = ''; }
      } else if (ev.key.length === 1 && !ev.ctrlKey && !ev.altKey && !ev.metaKey) {
        lineBuf += key; terminal.write(key);
      }
    });
    function clearTL() { for (let i = 0; i < lineBuf.length; i++) terminal.write('\b \b'); }
  }

  function execTerm(cmd) {
    const parts = cmd.split(/\s+/);
    const c = parts[0].toLowerCase(), a = parts.slice(1);
    switch (c) {
      case 'help':
        terminal.writeln('  help          Mostrar ayuda');
        terminal.writeln('  ls            Listar archivos');
        terminal.writeln('  cat <archivo> Mostrar contenido');
        terminal.writeln('  run           Ejecutar archivo actual');
        terminal.writeln('  newfile <n>   Crear archivo');
        terminal.writeln('  clear         Limpiar terminal');
        terminal.writeln('  code2blocks   Codigo -> bloques');
        terminal.writeln('  blocks2code   Bloques -> codigo');
        terminal.writeln('  parse         Mostrar IR');
        break;
      case 'ls':
        terminal.writeln('  ' + Object.keys(state.files).filter(f => !f.endsWith('/')).map(getFileName).join('  '));
        break;
      case 'cat':
        if (!a[0]) { terminal.writeln('  Uso: cat <archivo>'); break; }
        const fp = Object.keys(state.files).find(f => f.endsWith(a[0]));
        if (fp && state.files[fp]) state.files[fp].split('\n').forEach(l => terminal.writeln('  ' + l));
        else terminal.writeln('\x1b[31m  No encontrado: ' + a[0] + '\x1b[0m');
        break;
      case 'clear': terminal.clear(); break;
      case 'newfile':
        if (!a[0]) { terminal.writeln('  Uso: newfile <nombre>'); break; }
        state.files['mi-proyecto/' + a[0]] = '';
        terminal.writeln('  Creado: ' + a[0]); renderFileTree();
        break;
      case 'run':
        if (!state.activeFile) { terminal.writeln('\x1b[31m  Sin archivo abierto\x1b[0m'); break; }
        if (state.language === 'javascript') {
          terminal.writeln('\x1b[90m  Ejecutando ' + getFileName(state.activeFile) + '...\x1b[0m');
          const origLog = console.log;
          console.log = (...a) => terminal.writeln('  ' + a.join(' '));
          try { eval(state.files[state.activeFile]); terminal.writeln('\x1b[32m  OK\x1b[0m'); }
          catch (e) { terminal.writeln('\x1b[31m  Error: ' + e.message + '\x1b[0m'); }
          console.log = origLog;
        } else {
          terminal.writeln('\x1b[33m  Solo JavaScript disponible en web\x1b[0m');
        }
        break;
      case 'code2blocks': syncCodeToBlocks(); terminal.writeln('\x1b[32m  Sincronizado\x1b[0m'); break;
      case 'blocks2code': syncBlocksToCode(); terminal.writeln('\x1b[32m  Sincronizado\x1b[0m'); break;
      case 'parse':
        if (!editor) { terminal.writeln('\x1b[31m  Sin codigo\x1b[0m'); break; }
        try {
          const code = editor.getValue();
          let ir;
          if (state.language === 'python') ir = new E.PythonParser().parse(code, state.language);
          else if (state.language === 'javascript') ir = new E.JavaScriptParser().parse(code, state.language);
          else if (state.language === 'batch') ir = new E.BatchParser().parse(code, state.language);
          else { terminal.writeln('\x1b[31m  Sin parser\x1b[0m'); break; }
          terminal.writeln('\x1b[32m  IR: ' + (ir.stmts ? ir.stmts.length : 0) + ' declaraciones\x1b[0m');
          if (ir.stmts) ir.stmts.forEach(s => terminal.writeln('  -> ' + s.kind));
        } catch (err) { terminal.writeln('\x1b[31m  Error: ' + err.message + '\x1b[0m'); }
        break;
      default: terminal.writeln('\x1b[31m  Desconocido: ' + c + '\x1b[0m');
    }
  }

  function switchBottomTab(tab) {
    state.bottomTab = tab;
    document.querySelectorAll('.bottom-tab').forEach(b => b.classList.toggle('active', b.dataset.btab === tab));
    document.getElementById('terminalContainer').style.display = tab === 'terminal' ? 'block' : 'none';
    document.getElementById('outputContainer').style.display = tab === 'output' ? 'block' : 'none';
    if (tab === 'terminal' && fitAddon) fitAddon.fit();
  }
  function toggleBottomPanel() {
    state.bottomOpen = !state.bottomOpen;
    saveState();
    document.getElementById('bottomPanel').classList.toggle('collapsed', !state.bottomOpen);
    setTimeout(() => { if (fitAddon) fitAddon.fit(); if (editor) editor.layout(); }, 150);
  }
  function toggleSidebar() {
    state.sidebarOpen = !state.sidebarOpen;
    saveState();
    document.getElementById('sidebar').classList.toggle('collapsed', !state.sidebarOpen);
    setTimeout(() => { if (editor) editor.layout(); }, 150);
  }

  function notify(msg, type) {
    const el = document.createElement('div');
    el.className = 'notification ' + (type || 'info');
    el.textContent = msg;
    document.getElementById('notifications').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function showFileContextMenu(e, path) {
    e.preventDefault();
    removeContextMenu();
    const menu = document.createElement('div');
    menu.className = 'context-menu';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    const items = [
      { label: 'Abrir', action: () => openFile(path) },
      { label: 'Renombrar', action: () => renameFile(path) },
      null,
      { label: 'Eliminar', action: () => deleteFile(path), danger: true },
    ];
    items.forEach(item => {
      if (item === null) { menu.innerHTML += '<div class="context-menu-divider"></div>'; return; }
      const el = document.createElement('div');
      el.className = 'context-menu-item' + (item.danger ? ' danger' : '');
      el.textContent = item.label;
      el.onclick = () => { removeContextMenu(); item.action(); };
      menu.appendChild(el);
    });
    document.body.appendChild(menu);
    document.addEventListener('click', removeContextMenu, { once: true });
  }
  function removeContextMenu() { document.querySelectorAll('.context-menu').forEach(m => m.remove()); }
  function renameFile(path) {
    const n = prompt('Nuevo nombre:', getFileName(path));
    if (!n || n === getFileName(path)) return;
    const dir = path.split('/').slice(0, -1).join('/');
    const newPath = dir + '/' + n;
    state.files[newPath] = state.files[path];
    delete state.files[path];
    if (state.activeFile === path) {
      state.openFiles = state.openFiles.map(f => f === path ? newPath : f);
      state.activeFile = newPath;
      openFile(newPath);
    }
    renderFileTree();
  }
  function deleteFile(path) {
    if (!confirm('Eliminar ' + getFileName(path) + '?')) return;
    delete state.files[path];
    closeFile(path); renderFileTree();
  }

  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === '`') { e.preventDefault(); toggleBottomPanel(); }
    if (e.ctrlKey && e.key === 'b') { e.preventDefault(); toggleSidebar(); }
    if (e.ctrlKey && e.key === '1') { e.preventDefault(); setViewMode('code'); }
    if (e.ctrlKey && e.key === '2') { e.preventDefault(); setViewMode('blocks'); }
    if (e.ctrlKey && e.key === '3') { e.preventDefault(); setViewMode('split'); }
    if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undoBlocks(); }
    if (e.ctrlKey && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redoBlocks(); }
  });

  function newProject() {
    const name = prompt('Nombre del proyecto:', 'mi-proyecto');
    if (!name) return;
    Object.keys(state.files).forEach(k => delete state.files[k]);
    state.files[name + '/main.js'] = '// ' + name + '\nfunction main() {\n    console.log("Hola!");\n}\n\nmain();\n';
    state.openFiles = []; state.activeFile = null; state.modified.clear();
    state.blockNodes = []; state.blockEdges = [];
    showWelcome(); renderFileTree();
    document.getElementById('projectTitle').textContent = 'Libre Codigo - ' + name;
    notify('Proyecto: ' + name, 'success');
  }

  function exportProject() {
    const blob = new Blob([JSON.stringify({ files: state.files }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'libre-codigo-project.json';
    a.click();
    URL.revokeObjectURL(a.href);
    notify('Proyecto exportado', 'success');
  }

  function importProject() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.files && typeof data.files === 'object') {
            Object.keys(state.files).forEach(k => delete state.files[k]);
            Object.assign(state.files, data.files);
            state.openFiles = []; state.activeFile = null; state.modified.clear();
            showWelcome(); renderFileTree(); saveState();
            notify('Proyecto importado: ' + Object.keys(data.files).length + ' archivos', 'success');
          }
        } catch (err) { notify('Error importando: ' + err.message, 'error'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ── Resize handling ──
  window.addEventListener('resize', () => {
    if (editor) editor.layout();
    if (fitAddon) fitAddon.fit();
  });

  // ── Split divider drag ──
  (function initSplitDrag() {
    const divider = document.getElementById('splitDivider');
    const monacoEl = document.getElementById('monacoContainer');
    const blockEl = document.getElementById('blockEditorContainer');
    let dragging = false;
    divider.addEventListener('mousedown', (e) => {
      e.preventDefault();
      dragging = true;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const container = document.getElementById('editorContent');
      const rect = container.getBoundingClientRect();
      const offsetX = e.clientX - rect.left;
      const total = rect.width - 3;
      const pct = Math.max(20, Math.min(80, (offsetX / total) * 100));
      monacoEl.style.flex = 'none';
      monacoEl.style.width = pct + '%';
      blockEl.style.flex = 'none';
      blockEl.style.width = (100 - pct) + '%';
      if (editor) editor.layout();
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  })();

  // ── Init ──
  initFileSystem();
  renderFileTree();
  initTerminal();
  switchPanel('explorer');
  </script>
</body>
</html>
